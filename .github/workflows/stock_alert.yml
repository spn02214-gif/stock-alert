name: Stock Alert

on:
  schedule:
    # KR market: UTC 00-06 = KST 09-15 on weekdays
    - cron: '0 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '0 3 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '0 6 * * 1-5'
    # US market: UTC 14:30 = KST 23:30, UTC 15-21 = KST 00-06 on weekdays
    - cron: '30 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '0 20 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  kr-market:
    name: KR market scan
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 0 * * 1-5' ||
      github.event.schedule == '0 1 * * 1-5' ||
      github.event.schedule == '0 2 * * 1-5' ||
      github.event.schedule == '0 3 * * 1-5' ||
      github.event.schedule == '0 4 * * 1-5' ||
      github.event.schedule == '0 5 * * 1-5' ||
      github.event.schedule == '0 6 * * 1-5'
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: "8789518786"
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show Python package versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          packages = ["pykrx", "pandas", "requests", "yfinance", "schedule", "pytz"]
          for name in packages:
              try:
                  print(f"{name}=={md.version(name)}")
              except Exception as exc:
                  print(f"{name} version lookup failed: {exc}")
          PY

      - name: Probe pykrx market date lookup
        run: |
          python - <<'PY'
          from pykrx import stock
          from datetime import datetime, timedelta

          today = datetime.utcnow().date()
          print(f"UTC today: {today}")

          for offset in range(0, 11):
              date = (today - timedelta(days=offset)).strftime("%Y%m%d")
              try:
                  kospi = stock.get_market_ticker_list(date=date, market="KOSPI")
                  kosdaq = stock.get_market_ticker_list(date=date, market="KOSDAQ")
                  print(f"{date}: KOSPI={len(kospi)}, KOSDAQ={len(kosdaq)}")
              except Exception as exc:
                  print(f"{date}: ERROR {type(exc).__name__}: {exc}")
          PY

      - name: Run KR market scan
        run: python -c "from main import scan_kr; scan_kr()"

  us-market:
    name: US market scan
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 14 * * 1-5' ||
      github.event.schedule == '0 15 * * 1-5' ||
      github.event.schedule == '0 16 * * 1-5' ||
      github.event.schedule == '0 17 * * 1-5' ||
      github.event.schedule == '0 18 * * 1-5' ||
      github.event.schedule == '0 19 * * 1-5' ||
      github.event.schedule == '0 20 * * 1-5' ||
      github.event.schedule == '0 21 * * 1-5'
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: "8789518786"
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show Python package versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          packages = ["pykrx", "pandas", "requests", "yfinance", "schedule", "pytz"]
          for name in packages:
              try:
                  print(f"{name}=={md.version(name)}")
              except Exception as exc:
                  print(f"{name} version lookup failed: {exc}")
          PY

      - name: Run US market scan
        run: python -c "from main import scan_us; scan_us()"
